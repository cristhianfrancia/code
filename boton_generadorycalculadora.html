<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tipificación</title>
    <style>
        :root {
            --bitel-teal: #01768b;
            --bitel-blue: #0c477e;
            --bitel-yellow: #fbf32f;
            --text-main: #434343;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .button-group {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 8px;
        }

        /* 🌟 BOTÓN MINIMALISTA Y LIMPIO */
        .abrir-btn {
            background: transparent;
            color: var(--bitel-blue);
            border: 2px solid var(--bitel-blue);
            padding: 12px 24px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); /* Transición súper suave */
            cursor: pointer;
            max-width: 90vw;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.3px;
            outline: none;
        }

        .abrir-btn:hover {
            background: var(--bitel-blue);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(12,71,126,0.3);
        }

        .abrir-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 5px rgba(12,71,126,0.2);
        }

        /* Responsive */
        @media (max-width: 500px) {
            .abrir-btn {
                width: 100%;
                justify-content: center;
                font-size: 14px;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body oncontextmenu="return false">
    <div class="button-group">
        <button class="abrir-btn" onclick="abrirEstructura()">
            📂 PopUp (Clic para abrir)
        </button>
    </div>

    <script>
        let popupVentana = null;

        function abrirEstructura() {
            const url = "https://cristhianfrancia.github.io/code/generadorycalc.html";
            const ancho = 1300;
            const alto = 600;

            // 🛠️ CÁLCULO DEFINITIVO PARA CENTRAR (Ignora el iframe de Google Sites)
            const screenLeft = window.screenLeft !== undefined ? window.screenLeft : window.screenX;
            const screenTop = window.screenTop !== undefined ? window.screenTop : window.screenY;

            const monitorWidth = window.screen.width;
            const monitorHeight = window.screen.height;

            const left = Math.round((monitorWidth / 2) - (ancho / 2)) + screenLeft;
            const top = Math.round((monitorHeight / 2) - (alto / 2)) + screenTop;

            const opciones = `width=${ancho},height=${alto},left=${left},top=${top},resizable=yes,scrollbars=no`;

            if (!popupVentana || popupVentana.closed) {
                popupVentana = window.open(url, "PopupGenerador", opciones); 

                popupVentana.onload = () => {
                    setTimeout(() => {
                        try {
                            const style = popupVentana.document.createElement("style");
                            style.textContent = `
                                html, body {
                                    margin: 0;
                                    padding: 0;
                                    transform: scale(0.95); 
                                    transform-origin: top center;
                                    width: 100%;
                                    height: 100%;
                                    overflow-y: auto;
                                    -ms-overflow-style: none;
                                    scrollbar-width: none;
                                }
                                ::-webkit-scrollbar {
                                    width: 0 !important;
                                    height: 0 !important;
                                    display: none;
                                }
                            `;
                            popupVentana.document.head.appendChild(style);
                            popupVentana.scrollTo(0, 0);
                        } catch (e) {
                            console.warn("No se pudo inyectar CSS en el popup.");
                        }
                    }, 100);
                };
            } else {
                popupVentana.focus();
            }
        }

        /* 🔒 BLOQUEOS DE SEGURIDAD */
        document.onkeydown = function(e) {
            if (e.key === 'F12' || e.keyCode === 123) return false;
            if (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) return false;
            if (e.ctrlKey && e.key.toUpperCase() === 'U') return false;
            if (e.ctrlKey && ['P', 'S'].includes(e.key.toUpperCase())) {
                e.preventDefault();
                alert('Esa función está deshabilitada.');
                return false;
            }
        };

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        });

        /* 👨‍💻 CRÉDITOS DEL SISTEMA */
        window.addEventListener('load', function() {
            console.clear();
            console.log("%c⚠️ ALTO AHÍ ⚠️", "color: red; font-size: 30px; font-weight: bold;");
            console.log("%cSystem by Cristhian Francia.", "color: #0c477e; font-size: 16px; font-weight: bold;");
        });
    </script>
</body>
</html>
